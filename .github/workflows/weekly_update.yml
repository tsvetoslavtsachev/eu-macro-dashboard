name: Weekly EU Macro Update

on:
  schedule:
    # Всеки понеделник в 06:00 UTC (08:00 Sofia зиме / 09:00 Sofia лете)
    # Symmetric с US и China weekly_update workflow-ите
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Позволява ръчно стартиране от GitHub UI

# Public repo — НЕ commit-ваме briefing в git.
# Briefing-ът:
#   - Deploys на GitHub Pages: https://tsvetoslavtsachev.github.io/eu-macro-dashboard/
#   - Запазен и като 90d build artifact (за historical download)

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute cache key
        id: cache-key
        run: echo "key=eu-macro-cache-$(date -u +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            eu-macro-cache-

      - name: Smart refresh stale series
        run: python run.py --refresh-only

      - name: Generate HTML briefing
        run: python run.py --briefing --no-browser

      - name: Generate Markdown context
        run: python run.py --export-context --no-browser

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          LATEST_QUICK=$(ls -1t output/briefing_quick_*.html 2>/dev/null | head -n1)
          if [ -n "$LATEST_QUICK" ]; then
            cp "$LATEST_QUICK" _site/index.html
          else
            cp $(ls -1t output/briefing_*.html | grep -v briefing_quick | head -n1) _site/index.html
          fi
          cp output/briefing_*.html _site/ 2>/dev/null || true
          cp output/briefing_context_*.md _site/ 2>/dev/null || true
          ls -la _site/

      - name: Upload briefing artifact (90d download)
        uses: actions/upload-artifact@v4
        with:
          name: briefing-eu-${{ steps.cache-key.outputs.key }}
          path: |
            output/briefing_*.html
            output/briefing_context_*.md
          if-no-files-found: error
          retention-days: 90

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
