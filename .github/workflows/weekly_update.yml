name: Weekly EU Macro Update

on:
  schedule:
    # Всеки понеделник в 06:00 UTC (08:00 Sofia зиме / 09:00 Sofia лете)
    # Symmetric с US и China weekly_update workflow-ите
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Позволява ръчно стартиране от GitHub UI

# Public repo — НЕ commit-ваме briefing в git.
# Briefing-ите се качват като build artifact (90 дни retention).
# Download: gh run download <run-id> -n briefing-eu

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute cache key
        id: cache-key
        run: echo "key=eu-macro-cache-$(date -u +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            eu-macro-cache-

      - name: Smart refresh stale series
        run: python run.py --refresh-only

      - name: Generate HTML briefing
        run: python run.py --briefing --no-browser

      - name: Generate Markdown context
        run: python run.py --export-context --no-browser

      - name: Upload briefing artifact
        uses: actions/upload-artifact@v4
        with:
          name: briefing-eu-${{ steps.cache-key.outputs.key }}
          path: |
            output/briefing_*.html
            output/briefing_context_*.md
          if-no-files-found: error
          retention-days: 90
